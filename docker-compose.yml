services:
  mysql:
    image: mysql:8.0
    container_name: myflexio-mysql
    command: --default-time-zone=+03:00
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: myflexio
      TZ: Europe/Istanbul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
    networks:
      - myflexio-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: myflexio-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "8082:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - myflexio-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myflexio-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: myflexio
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 7d
      REFRESH_TOKEN_SECRET: your-super-secret-refresh-token-key-change-this-in-production
      REFRESH_TOKEN_EXPIRES_IN: 7d
      TZ: Europe/Istanbul
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      GREEN_API_INSTANCE_ID: ${GREEN_API_INSTANCE_ID:-}
      GREEN_API_TOKEN: ${GREEN_API_TOKEN:-}
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - myflexio-network

networks:
  myflexio-network:
    driver: bridge

volumes:
  mysql_data:
